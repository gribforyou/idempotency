# JdbcIdempotencyStore Configuration

# DataSource configuration (example for H2)
spring.datasource.url=jdbc:h2:mem:idempotency;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Connection pool settings (optional, if using HikariCP)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# Schema initialization (optional)
spring.datasource.schema=classpath:db/schema.sql

# Enable schema creation on startup (for dev/test)
spring.jpa.hibernate.ddl-auto=update

# Logging
logging.level.org.gribforyou=DEBUG